<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id = "title">Template</title>
    <link rel="stylesheet" href="../styles/itempage.css">
    <link rel = "icon" href = "../contents/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<header class='header'>
    <img src="../contents/logo.jpg" alt="logo" width="100" height="86.9" class="logo">
    <h1>Юношеская Математическая Школа</h1>
    <ul class='nav'>
        <li class = 'nav-item'>  <a href="main_page.html"><button>Главная Страница</button></a>
        </li>
        <li class = 'nav-item'>
            <a href="Catalogue.html"><button>Каталог</button></a>
        </li>
    </ul>
    <hr>
</header>
<body class = "body">
    <div class="item-page">
        <div class="image-wrapper">
            <img src = "../contents/Placeholder.png" alt="placeholder" class = "main-image">
        </div>
        <div class="item-page-content">
            <h2 class = "item-name"></h2>
            <p class = "item-price"></p>
            <p class = "item-description"></p>
            <button class = "add-to-cart-button">Добавить в корзину</button>
        </div>
    </div>
    <hr>
    <div class="item-editor">
        <button class = "delete-item-button" onclick="delete_item()">Удалить товар</button>
        <hr>
    </div>
    <hr>
    <button class = "open-attribute-constructor">Изменить товар</button>
    <div class = "attribute-constructor-wrapper">
        <div class = "attribute-constructor">
            <button class = "close-attribute-constructor">x</button>
            <p>Добавить другой аттрибут</p>
            <label for = "attribute-property">Введите название аттрибута</label>
            <input type = "text" id="attribute-property">
            <label for = "attribute-content">Введите содержимое аттрибута</label>
            <input type = "text" id="attribute-content">
            <button id = "upload-button" onclick="upload_attribute()">Загрузить</button>
            <hr>
            <p>Удалить аттрибут у этого товара</p>
            <label for = "delete-attribute">Введите название аттрибута</label>
            <input type = "text" id="delete-attribute">
            <button id = "delete-button" onclick="delete_attribute()">Удалить</button>
            <hr>
            <p>Изменить аттрибут у этого товара</p>
            <label for = "update-attribute">Введите название аттрибута</label>
            <input type = "text" id="update-attribute">
            <label for = "new-content-form">Введите новое содержимое</label>
            <input type = "text" id="new-content-form">
            <button id = "update-button" onclick="update_attribute()">Изменить</button>
        </div>
    </div>
    <footer>
        <h3> Юношеская Математическая Школа, 2025</h3>
    </footer>
    <script src="../scripts/edit_item.js"></script>
    <script src="../scripts/attribute_constructor.js"></script>
    <script src="../scripts/update_template.js"></script>
</body>
</html>
